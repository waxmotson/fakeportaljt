<script>





	function shuffle(array) {
	  for (let i = array.length - 1; i > 0; i--) {
		const j = Math.floor(Math.random() * (i + 1));
		[array[i], array[j]] = [array[j], array[i]];
	  }
	  return array;
	}
	
	
	const messages = [
	  	"bro"
		
	  ];

	function buildTicker() {
	  const ticker = document.querySelector('#motd span');

	  const shuffled = shuffle([...messages]);

	  const spacer = "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;";



	  const tickerText = shuffled.join(spacer);


	  ticker.innerHTML = tickerText + spacer + tickerText;
	}
	
	buildTicker();
	setInterval(buildTicker, 800000);

	setInterval(() => {
   		location.reload();
  	}, 3600000);
	
</script>
